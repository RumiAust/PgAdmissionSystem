server.port=8080
# OracleDB connection settings
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:orcl
spring.datasource.username=db_iums_pg_admission
spring.datasource.password=ig100
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP settings
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=20
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.maxLifetime=2000000
spring.datasource.hikari.connectionTimeout=30000
spring.datasource.hikari.poolName=HikariPoolBooks

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.use-new-id-generator-mappings=false
#
spring.jpa.hibernate.ddl-auto= update

#File
pgAdmission.file.image.photo-height: 300
pgAdmission.file.image.signature-height: 80
pgAdmission.file.image.width: 300
pgAdmission.file.image.max-image-size: 50
pgAdmission.file.max-document-size: 10240
pgAdmission.file.image.photo-destination: ${PG_PHOTO_DESTINATION}
pgAdmission.file.image.signature-destination: ${PG_SIGNATURE_DESTINATION}
pgAdmission.file.image.file-destination: ${PG_FILE_DESTINATION}