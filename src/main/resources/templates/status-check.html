<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Application Form</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <title>Aust Master's Admission Portal</title>
    <style>
        html {
            position: relative;
            min-height: 100%;
        }

        h3{
            color: chocolate;
        }
        .form-group.required .input-group-prepend:before {
            content:"*";
            color:red;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="#" style="font-size: 25px;font-family: 'Times New Roman'">
        <img src="logo-aust.png" width="40" height="40" alt=""> AUST Master's Admission
    </a>
    <form class="form-inline my-2 my-lg-0">
        <a class="navbar-brand" href="/applicationForm"><i class="fa fa-fw fa-home" style="color: chartreuse"></i>Home</a>
        <a class="navbar-brand" href="/statusCheck"><i class="fa fa-fw fa-search" style="color: deepskyblue"></i>Application Status</a>
        <a class="navbar-brand" href="#"><i class="fa fa-info-circle"  style="color: deeppink"></i>&nbsp;How to Apply</a>
        <a class="navbar-brand" href="#"><i class="fa fa-question" style="color: red"></i>&nbsp;FAQ</a>
    </form>
</nav>

<div class="container" style="border: 1px solid black;margin-top: 40px;margin-bottom: 20px">
    <form action="#" th:action="@{/apply}" th:object="${applicant}" method="post" >
        <div class="container" style="margin-top: 40px;margin-bottom: 20px">
            <div align="center">
                <h1>Ahsanullah University of Science and Technology</h1>
                <h2 style="color: dimgray">Master's Application Portal</h2>
                <h3 th:text="'Semester: '+${semester.getSemesterName()}"></h3>
            </div>
        <h6><strong>All field's with <em style="color: red">*</em> sign must be filled up to perform search.</strong>
        <div class="container border" style="margin-top: 10px;margin-bottom: 20px">
            <div class="card border-secondary mb-3" style="margin-top: 10px">
                <div class="card-body">
                    <div align="center">
                        <div class="row">
                            <div class="col-sm-12 col-md-4">
                            </div>
                            <div class="col-sm-12 col-md-4">
                                <div class="form-group required">
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <div class="input-group-text">Application ID </div>
                                        </div>
                                        <input type="text"  class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-12 col-md-4">
                            </div>
                            <div class="col-sm-12 col-md-4">
                                <div class="form-group required">
                                    <div class="input-group">
                                        <div class="input-group-prepend">
                                            <div class="input-group-text">Date of Birth &nbsp;</div>
                                        </div>
                                        <input type="date" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row" style="margin-bottom: 20px">
                            <div class="col-md-12" align="center">
                                <input type="submit" name="search" class="btn btn-outline-success" value="Search"/>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
</html>
